<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QQQ 定投策略</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Helvetica Neue",sans-serif;background:#0d1117;color:#e6edf3;height:100vh;overflow:hidden}
.container{max-width:440px;margin:0 auto;padding:0 12px;height:100vh;display:flex;flex-direction:column}

/* 头部 */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 4px;flex-shrink:0}
.header-left h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.header-left .sub{font-size:10px;color:#8b949e;margin-top:1px}
.settings-btn{width:34px;height:34px;border-radius:10px;border:1px solid #30363d;background:#161b22;color:#8b949e;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.settings-btn:active{background:#1c2128}

/* 刷新进度条 */
.refresh-bar{height:2px;background:transparent;flex-shrink:0;border-radius:1px;overflow:hidden}
.refresh-bar.active{background:#21262d}
.refresh-bar .fill{height:100%;width:0%;background:linear-gradient(90deg,#58a6ff,#3fb950);border-radius:1px;transition:width .3s}
.refresh-bar .fill.running{width:60%}
.refresh-bar .fill.done{width:100%;opacity:0;transition:width .2s,opacity .4s}

/* 滚动区 */
.scroll{flex:1;overflow-y:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}

/* 操作推荐卡 */
.action-card{border-radius:12px;padding:12px 14px;margin:4px 0;background:linear-gradient(135deg,#1a1f2e,#161b22);border:1px solid #30363d}
.action-row{display:flex;align-items:center;justify-content:space-between}
.action-left{display:flex;align-items:center;gap:8px}
.action-icon{font-size:24px;line-height:1}
.action-text{font-size:15px;font-weight:700;letter-spacing:-.2px}
.action-amount{font-size:20px;font-weight:800;letter-spacing:-.5px}
.action-meta{display:flex;gap:10px;margin-top:6px;font-size:10px;color:#8b949e;flex-wrap:wrap}
.action-meta span{display:inline-flex;align-items:center;gap:3px}

/* 五数据条 */
.data-strip{display:flex;gap:4px;margin:4px 0}
.data-block{flex:1;border-radius:8px;padding:6px 3px;text-align:center;background:#161b22;border:1px solid #21262d;min-width:0}
.data-block .lbl{font-size:8px;color:#8b949e;margin-bottom:1px;white-space:nowrap}
.data-block .val{font-size:14px;font-weight:700}
.data-block .sub{font-size:8px;color:#8b949e;margin-top:1px;white-space:nowrap}
.stale-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:#d29922;margin-left:2px;vertical-align:middle}

/* 涨跌色 */
.val-up{color:#3fb950}
.val-down{color:#f85149}
.val-flat{color:#8b949e}

/* 趋势条 */
.trend-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-radius:8px;margin:3px 0;font-size:10px;border:1px solid #21262d;background:#161b22}
.trend-bar .trend-left{display:flex;align-items:center;gap:5px}
.trend-bar .trend-icon{font-size:12px}
.trend-bar .trend-note{color:#8b949e;font-size:9px}
.trend-cap-badge{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600}
.trend-cap-badge.bull{background:#002d1a;color:#3fb950}
.trend-cap-badge.bear{background:#3d0000;color:#f85149}

/* VIX过期横幅 */
.vix-banner{background:#3d3200;color:#d29922;font-size:9px;padding:3px 8px;border-radius:6px;margin:2px 0;text-align:center;display:none}

/* 档位 */
.tier-bar{display:flex;gap:3px;margin:4px 0}
.tier{padding:5px 2px;border-radius:6px;flex:1;text-align:center;font-size:7.5px;border:1px solid #21262d;background:#161b22;color:#484f58;transition:.3s}
.tier .tnum{font-size:11px;font-weight:700;display:block}
.tier.active{border-color:var(--tc);background:var(--tb);color:#fff}
.tier.active .tnum{color:var(--tc)}
.tier.capped{opacity:.4}

/* 结果 */
.result-box{border-radius:10px;margin:4px 0;padding:10px 12px;background:#1c2128;border:1px solid #30363d}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.result-row+.result-row{border-top:1px solid #21262d;margin-top:3px;padding-top:6px}
.result-row .label{font-size:11px;color:#8b949e}
.result-row .value{font-size:13px;font-weight:600}
.result-row .value.big{font-size:20px;font-weight:800;letter-spacing:-.5px}
.result-row .val-pos{color:#3fb950}
.result-row .val-neg{color:#f85149}
.result-row .val-neutral{color:#8b949e}
.result-row .val-warn{color:#d29922}

/* 判断详情 */
.detail-box{margin:4px 0;padding:8px 10px;border-radius:8px;background:#161b22;border:1px solid #21262d}
.detail-box .title{font-size:10px;color:#8b949e;margin-bottom:4px}
.detail-line{font-size:11px;padding:2px 0;color:#c9d1d9}
.detail-line .tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;margin-right:3px}
.detail-line .tag.green{background:#002d1a;color:#3fb950}
.detail-line .tag.yellow{background:#3d3200;color:#d29922}
.detail-line .tag.red{background:#3d0000;color:#f85149}
.detail-line .tag.gray{background:#1c2128;color:#8b949e}
.detail-line .tag.blue{background:#001a3d;color:#58a6ff}

/* 止盈 */
.tp-box{margin:4px 0;padding:8px 10px;border-radius:8px;background:#161b22;border:1px solid #21262d;display:none}
.tp-box .tp-title{font-size:10px;color:#8b949e;margin-bottom:4px}
.tp-line{font-size:11px;padding:2px 0;color:#c9d1d9}
.tp-line .tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;margin-right:3px}
.tp-line .tag.sell{background:#3d0000;color:#f85149}
.tp-line .tag.hold{background:#002d1a;color:#3fb950}
.tp-line .tag.warn{background:#3d3200;color:#d29922}

/* 底部 */
.footer{text-align:center;font-size:9px;color:#484f58;padding:4px 0;flex-shrink:0}

/* 按钮 */
.btn-primary{width:100%;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;margin:3px 0;background:#238636;color:#fff;transition:opacity .2s;flex-shrink:0}
.btn-primary:active{opacity:.7}
.btn-primary:disabled{opacity:.4;pointer-events:none}

/* 首次加载/错误 */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.spinner{width:26px;height:26px;border:3px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-box p{color:#8b949e;font-size:12px;margin-top:6px}
.state-box .icon{font-size:32px;margin-bottom:4px}

/* 设置弹窗 */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:none}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-radius:16px 16px 0 0;padding:18px;z-index:101;transform:translateY(100%);transition:transform .35s ease;max-width:440px;margin:0 auto}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:30px;height:4px;border-radius:2px;background:#30363d;margin:0 auto 12px}
.sheet h3{font-size:14px;font-weight:600;margin-bottom:12px;text-align:center}
.form-group{margin-bottom:10px}
.form-group label{font-size:11px;color:#8b949e;display:block;margin-bottom:2px}
.form-group input,.form-group select{width:100%;padding:9px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:15px;font-weight:600}
.form-group select{appearance:auto;-webkit-appearance:auto}
.form-hint{font-size:9px;color:#484f58;margin-top:2px}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>QQQ 定投策略</h1>
      <div class="sub" id="updateTime">加载中...</div>
    </div>
    <button class="settings-btn" onclick="showSettings()" aria-label="设置">⚙</button>
  </div>

  <div class="refresh-bar" id="refreshBar"><div class="fill" id="refreshFill"></div></div>

  <div class="state-box" id="loading">
    <div class="spinner"></div>
    <p>获取数据中...</p>
  </div>

  <div class="state-box" id="error" style="display:none">
    <div class="icon">⚠️</div>
    <p id="errorMsg" style="margin-bottom:10px">数据获取失败</p>
    <button class="btn-primary" style="width:200px" onclick="loadData()">重新获取</button>
  </div>

  <div id="content" style="display:none">
    <div class="scroll">

      <!-- 推荐操作卡 -->
      <div class="action-card" id="actionCard">
        <div class="action-row">
          <div class="action-left">
            <span class="action-icon" id="actionIcon">📊</span>
            <span class="action-text" id="actionText">加载中</span>
          </div>
          <span class="action-amount" id="actionAmount">--</span>
        </div>
        <div class="action-meta" id="actionMeta"></div>
      </div>

      <!-- 五数据 -->
      <div class="data-strip">
        <div class="data-block">
          <div class="lbl">现价</div>
          <div class="val" id="price">--</div>
          <div class="sub">USD</div>
        </div>
        <div class="data-block">
          <div class="lbl">涨跌</div>
          <div class="val" id="changePct">--</div>
          <div class="sub" id="changeAbs">--</div>
        </div>
        <div class="data-block">
          <div class="lbl">52周回撤</div>
          <div class="val" id="drawdown">--</div>
          <div class="sub" id="ddDesc">--</div>
        </div>
        <div class="data-block">
          <div class="lbl">VIX</div>
          <div class="val" id="vix">--</div>
          <div class="sub" id="vixDesc">--</div>
        </div>
        <div class="data-block">
          <div class="lbl">RSI-14</div>
          <div class="val" id="rsiVal">--</div>
          <div class="sub" id="rsiDesc">--</div>
        </div>
      </div>

      <!-- 趋势条 -->
      <div class="trend-bar" id="trendBar">
        <div class="trend-left"><span class="trend-icon" id="trendIcon">📊</span><span id="trendText">--</span></div>
        <span class="trend-note" id="trendNote">--</span>
        <span class="trend-cap-badge" id="trendBadge" style="display:none">上限T2</span>
      </div>

      <!-- VIX 过期警告 -->
      <div class="vix-banner" id="vixBanner">⚠️ VIX 数据非交易时段，可能已过时</div>

      <!-- 档位 -->
      <div class="tier-bar" id="tierBar">
        <div class="tier" id="tier5"><span class="tnum">🚀</span>崩盘</div>
        <div class="tier" id="tier4"><span class="tnum">🔥</span>熊市</div>
        <div class="tier" id="tier3"><span class="tnum">⚡</span>恐慌</div>
        <div class="tier" id="tier2"><span class="tnum">🌊</span>中度</div>
        <div class="tier" id="tier1"><span class="tnum">💧</span>回调</div>
        <div class="tier" id="tier0"><span class="tnum">☀️</span>平静</div>
      </div>

      <!-- 结果 -->
      <div class="result-box" id="resultBox">
        <div class="result-row">
          <div class="label">每周基础</div>
          <div class="value" style="color:#8b949e">¥<span id="baseDisplay">675</span></div>
        </div>
        <div class="result-row">
          <div class="label" id="effLabel">有效倍率</div>
          <div class="value" id="effMultDisplay" style="color:#8b949e">--</div>
        </div>
        <div class="result-row" id="extraRow">
          <div class="label" id="extraLabel">操作</div>
          <div class="value big" id="extraAmount">--</div>
        </div>
        <div class="result-row">
          <div class="label">本周总投入</div>
          <div class="value big" id="totalAmount" style="color:#58a6ff">--</div>
        </div>
      </div>

      <!-- 判断详情 -->
      <div class="detail-box" id="detailBox">
        <div class="title">触发判断</div>
        <div id="detailLines"></div>
      </div>

      <!-- 止盈 -->
      <div class="tp-box" id="tpBox">
        <div class="tp-title">止盈 / 减仓信号</div>
        <div id="tpLines"></div>
      </div>

      <div class="footer">
        五档+趋势+RSI · 牛市上限T2 · 每周末投前刷新
      </div>
    </div>
    <button class="btn-primary" id="refreshBtn" onclick="loadData()">🔄 刷新数据</button>
  </div>
</div>

<!-- 设置弹窗 -->
<div class="overlay" id="overlay" onclick="hideSettings()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <h3>⚙ 定投设置</h3>
  <div class="form-group">
    <label>每周基础定投金额</label>
    <input type="number" id="baseInput" placeholder="675" min="100" step="50" inputmode="numeric">
    <div class="form-hint">基准金额，各档位在此基础上加仓</div>
  </div>
  <div class="form-group">
    <label>账户累计盈利 %</label>
    <input type="number" id="profitInput" placeholder="0" step="5" inputmode="decimal">
    <div class="form-hint">用于触发止盈信号</div>
  </div>
  <div class="form-group">
    <label>定投日（每周）</label>
    <select id="dcaDayInput">
      <option value="1">周一</option>
      <option value="2">周二</option>
      <option value="3">周三</option>
      <option value="4">周四</option>
      <option value="5" selected>周五</option>
    </select>
    <div class="form-hint">每周哪一天执行定投操作</div>
  </div>
  <button class="btn-primary" onclick="saveSettings()">保存</button>
</div>

<script>
// ========== 全局错误捕获 ==========
window.onerror=function(msg,url,line){showError('JS错误 L'+line+': '+msg);};
// ========== 存储 ==========
const SK='qqq_base',SP='qqq_profit',SD='qqq_dca_day';
function loadBase(){return parseInt(localStorage.getItem(SK))||675}
function saveBase(v){localStorage.setItem(SK,v.toString())}
function loadProfit(){return parseInt(localStorage.getItem(SP))||0}
function saveProfit(v){localStorage.setItem(SP,v.toString())}
function loadDcaDay(){return parseInt(localStorage.getItem(SD))||5}
function saveDcaDay(v){localStorage.setItem(SD,v.toString())}

let _loading=false;

// ========== 五档加仓标准 ==========
const TIERS=[
  {tier:0,label:'平静区',mult:0,vixTh:0,ddTh:0},
  {tier:1,label:'小幅回调',mult:0.5,vixTh:20,ddTh:10},
  {tier:2,label:'中度回调',mult:1.0,vixTh:25,ddTh:15},
  {tier:3,label:'恐慌性回调',mult:1.5,vixTh:30,ddTh:17},
  {tier:4,label:'深度熊市',mult:2.0,vixTh:35,ddTh:20},
  {tier:5,label:'史诗级崩盘',mult:3.0,vixTh:40,ddTh:30}
];
function getTier(vix,dd){
  if(vix==null)return{...TIERS[0],msg:'VIX数据不可用，仅保留基础定投'};
  if(vix<20)return{...TIERS[0],msg:'VIX<20：市场过热/泡沫区，禁止额外加仓'};
  for(let i=5;i>=1;i--){
    const t=TIERS[i];
    if(vix>=t.vixTh&&dd>=t.ddTh)return{...t,msg:t.label+'触发, VIX≥'+t.vixTh+', 回撤≥'+t.ddTh+'%'};
  }
  return{...TIERS[0],msg:'未触发任何加仓档位'};
}

// ========== K线计算 ==========
function calcMA(closes,period){
  if(closes.length<period)return null;
  const r=closes.slice(-period);
  return r.reduce((a,b)=>a+b,0)/period;
}
function calcRSI(closes,period){
  if(closes.length<period+1)return null;
  const r=closes.slice(-period-1);
  let g=0,l=0;
  for(let i=1;i<r.length;i++){const d=r[i]-r[i-1];if(d>0)g+=d;else l-=d}
  const ag=g/period,al=l/period;
  if(al===0)return 100;
  return 100-100/(1+ag/al);
}

// ========== 解析 ==========
function bytesToStr(buf){const b=new Uint8Array(buf);let s='';for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return s}
function parseQQQ(t){
  const m=t.match(/v_usQQQ="(.*?)"/);if(!m)return null;
  const f=m[1].split('~');if(f.length<68)return null;
  const p=parseFloat(f[3]),pc=parseFloat(f[4]),h52=parseFloat(f[48]),l52=parseFloat(f[49]);
  return(!isNaN(p)&&!isNaN(h52))?{price:p,prevClose:pc,high52:h52,low52:l52,time:f[30]}:null;
}
function parseVIX(t){
  const m=t.match(/v_usVIX="(.*?)"/);if(!m)return null;
  const f=m[1].split('~');if(f.length<4)return null;
  const v=parseFloat(f[3]);if(isNaN(v)||v<=0)return null;
  const ts=f[30]||'';let stale=false;
  if(ts){try{stale=(Date.now()-new Date(ts.replace(/-/g,'/')).getTime())>86400000}catch(e){stale=true}}
  return{vix:v,stale,time:ts};
}

// ========== 定投日计算 ==========
function daysUntilNextDCA(dcaDay){
  const now=new Date();
  const today=now.getDay();// 0=Sun,1=Mon...
  // Convert dcaDay(1=Mon..5=Fri) to js day
  let target=dcaDay;
  if(target<today)target+=7;
  let days=target-today;
  if(days===0){
    // Today is DCA day — has market passed?
    const hour=now.getHours();
    // US market opens 9:30 ET = ~21:30 Beijing time
    // If it's before market open, DCA is "today"; after, "next week"
    if(hour>=22)days=7; // Market already open, next week
  }
  return days;
}

// ========== 推荐操作 ==========
function getAction(tier,price,ma200,rsi,vix,dd,profit){
  let mult=tier.mult;
  let actionText='',actionIcon='',actionColor='#8b949e';
  let notes=[];

  // 1. 趋势过滤
  let isBull=null,trendCap=false;
  if(price!=null&&ma200!=null&&ma200>0){
    isBull=price>ma200;
    if(isBull&&tier.tier>=3){
      mult=2.0; // Cap at tier 2 effective
      trendCap=true;
      notes.push('牛市趋势，加仓上限T2');
    }
  }

  // 2. RSI 确认（T3+）
  let rsiNote=false;
  if(rsi!=null&&tier.tier>=3&&rsi>=40){
    notes.push('RSI='+rsi.toFixed(0)+'未超卖(<40)，重仓信号需确认');
    rsiNote=true;
  }

  // 3. 推荐操作
  if(profit>=35&&vix!=null&&vix<18){
    actionIcon='🛑';actionText='减仓止盈';actionColor='#f85149';
  }else if(profit>=50){
    actionIcon='💰';actionText='大幅止盈';actionColor='#f85149';
  }else if(profit>=20&&vix!=null&&vix<18){
    actionIcon='💵';actionText='部分止盈';actionColor='#d29922';
  }else if(tier.tier>=5){actionIcon='🚀';actionText='全力加仓';actionColor='#c62828';
  }else if(tier.tier>=4){actionIcon='🔥';actionText='三倍定投';actionColor='#f85149';
  }else if(tier.tier>=3){actionIcon='⚡';actionText='双倍定投+';actionColor='#f57c00';
  }else if(tier.tier>=2){actionIcon='🌊';actionText='双倍定投';actionColor='#d29922';
  }else if(tier.tier>=1){actionIcon='💧';actionText='小额加仓';actionColor='#58a6ff';
  }else{if(isBull===true&&ma200){actionIcon='☀️';actionText='正常定投';actionColor='#3fb950'}
       else{actionIcon='📊';actionText='正常定投';actionColor='#8b949e'}}

  // Trend note for action
  if(trendCap)actionText='🔹'+actionText;

  return{mult,actionText,actionIcon,actionColor,notes,isBull,trendCap,rsiNote};
}

// ========== 渲染 ==========
function render(d){
  try{
  const base=loadBase();
  document.getElementById('loading').style.display='none';
  document.getElementById('error').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('refreshBar').className='refresh-bar';

  // 时间
  const now=new Date();
  let timeDisplay;
  if(d.time){
    const p=d.time.split(' ');
    if(p.length>=2){
      const t=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0')+'-'+now.getDate().toString().padStart(2,'0');
      timeDisplay=(p[0]===t?'今日 ':'昨收 ')+p[1];
    }else{timeDisplay=d.time;}
  }else{timeDisplay=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');}
  document.getElementById('updateTime').textContent=timeDisplay;

  // 现价
  document.getElementById('price').textContent=d.price.toFixed(2);

  // 涨跌
  const chgEl=document.getElementById('changePct');
  const chgAbsEl=document.getElementById('changeAbs');
  if(d.prevClose!=null&&!isNaN(d.prevClose)&&d.prevClose>0){
    const chg=d.price-d.prevClose;
    const pct=(chg/d.prevClose)*100;
    const cls=chg>0?'val-up':(chg<0?'val-down':'val-flat');
    chgEl.textContent=(chg>0?'+':'')+pct.toFixed(2)+'%';
    chgEl.className='val '+cls;
    chgAbsEl.textContent=(chg>0?'+':'')+chg.toFixed(2);
    chgAbsEl.className='sub '+cls;
  }else{chgEl.textContent='--';chgEl.className='val val-flat';chgAbsEl.textContent='--';chgAbsEl.className='sub';}

  // 回撤
  document.getElementById('drawdown').textContent=d.drawdown+'%';
  document.getElementById('ddDesc').textContent=d.dd_desc;

  // VIX
  document.getElementById('vix').textContent=d.vix!=null?d.vix.toFixed(1):'N/A';
  document.getElementById('vixDesc').textContent=d.vix_desc;
  document.getElementById('vixBanner').style.display=(d.vix_stale&&d.vix!=null)?'block':'none';

  // RSI
  const rsiEl=document.getElementById('rsiVal');
  const rsiDescEl=document.getElementById('rsiDesc');
  if(d.rsi!=null){
    rsiEl.textContent=d.rsi.toFixed(0);
    rsiEl.className='val'+(d.rsi<40?' val-up':(d.rsi>70?' val-down':' val-flat'));
    rsiDescEl.textContent=d.rsi<40?'超卖区':(d.rsi>70?'超买区':'中性区');
  }else{rsiEl.textContent='--';rsiEl.className='val val-flat';rsiDescEl.textContent='无数据';}

  // ---- 趋势条 ----
  const trendBar=document.getElementById('trendBar');
  const trendIcon=document.getElementById('trendIcon');
  const trendText=document.getElementById('trendText');
  const trendNote=document.getElementById('trendNote');
  const trendBadge=document.getElementById('trendBadge');
  if(d.ma200!=null){
    const bull=d.price>d.ma200;
    trendIcon.textContent=bull?'📈':'📉';
    trendText.textContent='价格$'+d.price.toFixed(0)+' vs MA200 $'+d.ma200.toFixed(0)+' = '+(bull?'牛市':'熊市');
    trendText.style.color=bull?'#3fb950':'#f85149';
    trendNote.textContent=bull?'牛市上限T2，不追高':'熊市允许触发全部档位，越低越买';
    trendBadge.style.display=d.trendCap?'inline':'none';
    trendBadge.className='trend-cap-badge'+(bull?' bull':' bear');
    trendBar.style.borderColor=bull?'#002d1a':'#3d0000';
  }else{
    trendIcon.textContent='📊';
    trendText.textContent='MA200计算中（需200个交易日数据）';
    trendText.style.color='#8b949e';
    trendNote.textContent='--';
    trendBadge.style.display='none';
  }

  // ---- 操作推荐卡 ----
  const act=getAction(d.tierObj,d.price,d.ma200,d.rsi,d.vix,d.drawdown,d.profit);
  document.getElementById('actionIcon').textContent=act.actionIcon;
  document.getElementById('actionText').textContent=act.actionText;
  document.getElementById('actionText').style.color=act.actionColor;
  document.getElementById('actionCard').style.borderColor=act.actionColor;

  // Effective multiplier display
  const baseAmt=loadBase();
  const effExtra=Math.round(baseAmt*act.mult);
  const effTotal=baseAmt+effExtra;
  document.getElementById('actionAmount').textContent='¥'+effTotal.toLocaleString();
  document.getElementById('actionAmount').style.color=act.actionColor;

  // Action meta
  const metaEl=document.getElementById('actionMeta');
  let metaHtml='';
  // DCA countdown
  const dcaDay=loadDcaDay();
  const daysLeft=daysUntilNextDCA(dcaDay);
  const weekdayNames=['','周一','周二','周三','周四','周五'];
  metaHtml+='<span>📅 距定投('+weekdayNames[dcaDay]+'): '+(daysLeft===0?'今天':daysLeft+'天')+'</span>';
  // Raw tier
  const tierIcons=['☀️','💧','🌊','⚡','🔥','🚀'];
  metaHtml+='<span>🏷️ 原始档位: '+tierIcons[d.tierObj.tier]+'T'+d.tierObj.tier+'('+d.tierObj.mult+'×)'+'</span>';
  // Effective mult
  if(act.mult!==d.tierObj.mult){
    metaHtml+='<span>🔒 有效倍率: '+act.mult+'× (已过滤)</span>';
  }
  // Notes
  if(act.notes.length>0){
    act.notes.forEach(n=>{metaHtml+='<span>ℹ️ '+n+'</span>';});
  }
  // Trend info
  if(d.ma200!=null&&act.isBull!==null){
    metaHtml+='<span>'+(act.isBull?'📈 牛市':'📉 熊市')+'</span>';
  }
  metaEl.innerHTML=metaHtml;

  // ---- 档位条 ----
  const tc=['#484f58','#58a6ff','#d29922','#f57c00','#f85149','#c62828'];
  const tb=['#161b22','#001a3d','#3d3200','#3d2000','#3d0000','#3d0000'];
  for(let i=0;i<=5;i++){
    const el=document.getElementById('tier'+i);
    if(!el)continue;
    const isActive=(i===d.tierObj.tier);
    const isCapped=(act.trendCap&&i>=3);
    el.className='tier'+(isActive?' active':'')+(isCapped&&!isActive?' capped':'');
    if(isActive){el.style.setProperty('--tc',tc[i]);el.style.setProperty('--tb',tb[i]);}
  }

  // ---- 金额 ----
  document.getElementById('baseDisplay').textContent=baseAmt.toLocaleString();
  document.getElementById('effMultDisplay').textContent=d.tierObj.mult+'×';

  const effMultLabel=document.getElementById('effLabel');
  if(act.mult!==d.tierObj.mult){
    effMultLabel.textContent='有效倍率(原'+d.tierObj.mult+'×→'+act.mult+'×)';
    document.getElementById('effMultDisplay').textContent=act.mult+'×';
    document.getElementById('effMultDisplay').className='value val-warn';
  }else{
    effMultLabel.textContent='原始倍率';
    document.getElementById('effMultDisplay').textContent=d.tierObj.mult+'×';
    document.getElementById('effMultDisplay').className='value';
    document.getElementById('effMultDisplay').style.color='#8b949e';
  }

  const extraEl=document.getElementById('extraAmount');
  const extraLabelEl=document.getElementById('extraLabel');
  if(effExtra>0){
    extraEl.textContent='+¥'+effExtra.toLocaleString();
    extraEl.className='value big val-pos';
    extraLabelEl.textContent='额外加仓';
  }else{
    extraEl.textContent='无额外加仓';
    extraEl.className='value big val-neutral';
    extraLabelEl.textContent='操作';
  }
  document.getElementById('totalAmount').textContent='¥'+effTotal.toLocaleString();

  // ---- 判断详情 ----
  const dl=document.getElementById('detailLines');
  let html='';
  html+='<div class="detail-line">VIX='+(d.vix!=null?d.vix.toFixed(1):'N/A')+'，回撤='+d.drawdown+'%';
  if(d.rsi!=null)html+='，RSI-14='+d.rsi.toFixed(0);
  if(d.ma200!=null)html+='，MA200='+d.ma200.toFixed(2);
  html+='</div>';

  html+='<div class="detail-line"><span class="tag '+(d.tierObj.tier>0?'green':'gray')+'">T'+d.tierObj.tier+'</span>'+d.tierObj.msg+'</div>';

  if(d.tierObj.tier>0){
    html+='<div class="detail-line">条件：VIX≥'+d.tierObj.vixTh+' + 回撤≥'+d.tierObj.ddTh+'%</div>';
    html+='<div class="detail-line">基础¥'+baseAmt.toLocaleString()+' × '+d.tierObj.mult+' = +¥'+Math.round(baseAmt*d.tierObj.mult).toLocaleString()+'</div>';
  }

  if(act.trendCap)html+='<div class="detail-line"><span class="tag yellow">🔒 趋势过滤</span>牛市上限T2，有效倍率从'+d.tierObj.mult+'×降至'+act.mult+'×</div>';
  if(act.rsiNote)html+='<div class="detail-line"><span class="tag yellow">⚠️ RSI确认</span>RSI='+(d.rsi!=null?d.rsi.toFixed(0):'N/A')+'≥40，重仓档需RSI<40确认</div>';
  if(d.ma200!=null&&act.isBull!==null){
    html+='<div class="detail-line"><span class="tag '+(act.isBull?'green':'red')+'">'+(act.isBull?'📈 牛市':'📉 熊市')+'</span>价格$'+d.price.toFixed(0)+(act.isBull?'>':'<')+'MA200 $'+d.ma200.toFixed(0)+'</div>';
  }
  dl.innerHTML=html;

  // ---- 止盈 ----
  const profit=d.profit;
  const tpEl=document.getElementById('tpBox');
  const tpLines=document.getElementById('tpLines');
  let tpHtml='';

  // R1: VIX<18 + profit≥35
  if(d.vix!=null&&d.vix<18&&profit>=35){
    tpHtml+='<div class="tp-line"><span class="tag sell">🛑 卖出25%</span>VIX<18 + 盈利'+profit+'%≥35%</div>';
    tpHtml+='<div class="tp-line">→ 卖出总仓位25%，资金划入备用池</div>';
  }else if(d.vix!=null&&d.vix<18){
    tpHtml+='<div class="tp-line"><span class="tag warn">👀 泡沫预警</span>VIX<18，盈利'+profit+'%，达35%触发（差'+(35-profit)+'%）</div>';
  }else{
    tpHtml+='<div class="tp-line"><span class="tag hold">✅ 正常</span>VIX≥18，未进入泡沫区</div>';
  }

  // R2: 20% / 50% 止盈
  if(profit>=50){
    tpHtml+='<div class="tp-line"><span class="tag sell">💰 卖出30%</span>盈利'+profit+'%≥50%，大幅锁定利润</div>';
  }else if(profit>=20){
    tpHtml+='<div class="tp-line"><span class="tag sell">💵 卖出10%</span>盈利'+profit+'%≥20%，落袋为安</div>';
  }else{
    tpHtml+='<div class="tp-line"><span class="tag hold">✅ 持有</span>盈利'+profit+'%，未达20%止盈线</div>';
  }

  // R3: 保护性减仓
  if(d.vix!=null&&d.vix>35&&d.drawdown>=40){
    tpHtml+='<div class="tp-line"><span class="tag sell">🛡️ 减仓10%</span>极端趋势走熊保护</div>';
    tpHtml+='<div class="tp-line">→ 需确认连续下跌≥8周再执行</div>';
  }else if(d.vix!=null&&d.vix>35){
    tpHtml+='<div class="tp-line"><span class="tag warn">👀 监控</span>VIX>35但回撤'+d.drawdown+'%不足40%</div>';
  }else{
    tpHtml+='<div class="tp-line"><span class="tag hold">✅ 正常</span>未触发保护性减仓</div>';
  }

  tpEl.style.display='block';
  tpLines.innerHTML=tpHtml;

  startTimer(60);
  }catch(e){
    showError('渲染错误: '+e.message);
  }
}

// ========== 定时器 ==========
let ti=null;
function startTimer(s){if(ti)clearInterval(ti);let r=s;ti=setInterval(()=>{r--;if(r<=0){clearInterval(ti);loadData()}},1000)}

function showRefreshProgress(){
  document.getElementById('refreshBar').className='refresh-bar active';
  document.getElementById('refreshFill').className='fill running';
}
function hideRefreshProgress(){
  const fill=document.getElementById('refreshFill');
  fill.className='fill done';
  setTimeout(()=>{document.getElementById('refreshBar').className='refresh-bar';fill.className='fill';},500);
}

// ========== 数据获取 ==========
async function loadData(){
  if(_loading)return;
  _loading=true;

  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;
  btn.textContent='⏳ 获取中...';

  const contentEl=document.getElementById('content');
  const loadingEl=document.getElementById('loading');
  const errorEl=document.getElementById('error');
  const isFirstLoad=(contentEl.style.display==='none'||contentEl.style.display==='')&&errorEl.style.display!=='flex';
  if(isFirstLoad){loadingEl.style.display='flex';contentEl.style.display='none';}
  else{showRefreshProgress();}
  errorEl.style.display='none';

  const ctrl=new AbortController();
  const to=setTimeout(()=>ctrl.abort(),15000);

  try{
    const [qr,vr,kr]=await Promise.all([
      fetch('https://qt.gtimg.cn/q=usQQQ',{signal:ctrl.signal}),
      fetch('https://qt.gtimg.cn/q=usVIX',{signal:ctrl.signal}),
      fetch('https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=usQQQ,day,,,200,qfq',{signal:ctrl.signal})
    ]);
    clearTimeout(to);
    _loading=false;

    // Parse QQQ
    const qt=bytesToStr(await qr.arrayBuffer());
    const qqq=parseQQQ(qt);
    if(!qqq){showError('QQQ数据解析失败');return;}

    // Parse VIX
    const vt=bytesToStr(await vr.arrayBuffer());
    const vixD=parseVIX(vt);

    // Parse K-line
    let closes=[],ma200=null,rsi=null;
    try{
      const kd=await kr.json();
      const days=kd.data.usQQQ.day;
      if(days&&days.length>0){
        // Format: [date, open, close, high, low, volume]
        closes=days.map(d=>parseFloat(d[2])).filter(v=>!isNaN(v));
        ma200=calcMA(closes,200);
        rsi=calcRSI(closes,14);
      }
    }catch(e){/* K-line parse fail, continue without MA/RSI */}

    const dd=((qqq.high52-qqq.price)/qqq.high52)*100;
    const v=vixD?vixD.vix:null;
    const tierObj=getTier(v,dd);
    const profit=loadProfit();

    let vixDesc='N/A';
    if(v!=null){
      if(v<15)vixDesc='自满';else if(v<20)vixDesc='正常';else if(v<25)vixDesc='关注';
      else if(v<30)vixDesc='恐慌';else if(v<40)vixDesc='极度恐慌';else vixDesc='极端恐慌';
    }
    let ddDesc='正常波动';
    if(dd>=30)ddDesc='崩盘';else if(dd>=20)ddDesc='深度调整';else if(dd>=17)ddDesc='恐慌性回调';
    else if(dd>=15)ddDesc='中度调整';else if(dd>=10)ddDesc='小幅回调';else if(dd>=5)ddDesc='轻微回调';

    render({
      price:qqq.price,prevClose:qqq.prevClose,
      drawdown:Math.round(dd*10)/10,time:qqq.time,
      vix:v,vix_desc:vixDesc,vix_stale:vixD?vixD.stale:false,
      dd_desc:ddDesc,
      tierObj,ma200,rsi,profit
    });
  }catch(e){
    clearTimeout(to);_loading=false;
    if(e.name==='AbortError')showError('请求超时，请检查网络连接');
    else showError('请求失败: '+(e.message||e.name||''));
  }finally{
    btn.disabled=false;
    btn.textContent='🔄 刷新数据';
    hideRefreshProgress();
  }
}
function showError(m){
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='none';
  document.getElementById('error').style.display='flex';
  document.getElementById('errorMsg').textContent=m;
  hideRefreshProgress();
}

// ========== 设置 ==========
function showSettings(){
  document.getElementById('baseInput').value=loadBase();
  document.getElementById('profitInput').value=loadProfit();
  document.getElementById('dcaDayInput').value=loadDcaDay();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function hideSettings(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}
function saveSettings(){
  const v=parseInt(document.getElementById('baseInput').value)||675;
  const p=parseInt(document.getElementById('profitInput').value)||0;
  const d=parseInt(document.getElementById('dcaDayInput').value)||5;
  saveBase(v);saveProfit(p);saveDcaDay(d);
  hideSettings();loadData();
}

loadData();
</script>
