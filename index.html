<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QQQ 定投策略</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Helvetica Neue",sans-serif;background:#0d1117;color:#e6edf3;height:100vh;overflow:hidden}
.container{max-width:440px;margin:0 auto;padding:0 14px;height:100vh;display:flex;flex-direction:column}

/* 头部固定 */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px;flex-shrink:0}
.header-left h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header-left .sub{font-size:11px;color:#8b949e;margin-top:1px}
.settings-btn{width:36px;height:36px;border-radius:10px;border:1px solid #30363d;background:#161b22;color:#8b949e;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.settings-btn:active{background:#1c2128}

/* 可滚动内容 */
.scroll{flex:1;overflow-y:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch}

/* 信号卡 */
.signal-card{border-radius:14px;padding:20px 16px;margin:8px 0;text-align:center;background:linear-gradient(135deg,#1a1f2e,#161b22);border:1px solid #30363d;transition:border-color .5s}
.signal-icon{font-size:36px;margin-bottom:4px}
.signal-label{font-size:22px;font-weight:700;letter-spacing:-.3px}
.signal-detail{font-size:12px;color:#8b949e;margin-top:3px}

/* 三数据 */
.data-strip{display:flex;gap:6px;margin:8px 0}
.data-block{flex:1;border-radius:10px;padding:10px 8px;text-align:center;background:#161b22;border:1px solid #21262d}
.data-block .lbl{font-size:10px;color:#8b949e;margin-bottom:2px}
.data-block .val{font-size:18px;font-weight:700}
.data-block .sub{font-size:10px;color:#8b949e;margin-top:2px}
.stale-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#d29922;margin-left:3px;vertical-align:middle}

/* 档位指示器 */
.tier-bar{display:flex;gap:4px;margin:8px 0}
.tier{padding:8px 4px;border-radius:8px;flex:1;text-align:center;font-size:9px;border:1px solid #21262d;background:#161b22;color:#484f58;transition:.3s}
.tier .tnum{font-size:14px;font-weight:700;display:block}
.tier.active{border-color:var(--tc);background:var(--tb);color:#fff}
.tier.active .tnum{color:var(--tc)}
.tier.used{opacity:.5}

/* 结果区 */
.result-box{border-radius:12px;margin:8px 0;padding:14px;background:#1c2128;border:1px solid #30363d}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.result-row+.result-row{border-top:1px solid #21262d;margin-top:5px;padding-top:10px}
.result-row .label{font-size:12px;color:#8b949e}
.result-row .value{font-size:15px;font-weight:600}
.result-row .value.big{font-size:24px;font-weight:800;letter-spacing:-.5px}
.result-row .val-pos{color:#3fb950}
.result-row .val-neg{color:#f85149}
.result-row .val-neutral{color:#8b949e}

/* 判断依据 */
.detail-box{margin:8px 0;padding:12px;border-radius:10px;background:#161b22;border:1px solid #21262d}
.detail-box .title{font-size:11px;color:#8b949e;margin-bottom:6px}
.detail-line{font-size:12px;padding:3px 0;color:#c9d1d9}
.detail-line .tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;margin-right:4px}
.detail-line .tag.green{background:#002d1a;color:#3fb950}
.detail-line .tag.yellow{background:#3d3200;color:#d29922}
.detail-line .tag.red{background:#3d0000;color:#f85149}
.detail-line .tag.gray{background:#1c2128;color:#8b949e}

/* 止盈区 */
.tp-box{margin:8px 0;padding:12px;border-radius:10px;background:#161b22;border:1px solid #21262d;display:none}
.tp-box .tp-title{font-size:11px;color:#8b949e;margin-bottom:6px}
.tp-line{font-size:12px;padding:3px 0;color:#c9d1d9}
.tp-line .tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;margin-right:4px}
.tp-line .tag.sell{background:#3d0000;color:#f85149}
.tp-line .tag.hold{background:#002d1a;color:#3fb950}
.tp-line .tag.warn{background:#3d3200;color:#d29922}

/* 底部 */
.footer{text-align:center;font-size:10px;color:#484f58;padding:8px 0;flex-shrink:0}

/* 按钮 */
.btn-primary{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin:6px 0;background:#238636;color:#fff;transition:opacity .2s;flex-shrink:0}
.btn-primary:active{opacity:.7}
.btn-primary:disabled{opacity:.4;pointer-events:none}

/* 错误/加载 */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.spinner{width:30px;height:30px;border:3px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-box p{color:#8b949e;font-size:13px;margin-top:10px}
.state-box .icon{font-size:40px;margin-bottom:8px}

/* 设置弹窗 */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:none}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-radius:16px 16px 0 0;padding:20px;z-index:101;transform:translateY(100%);transition:transform .35s ease;max-width:440px;margin:0 auto}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:32px;height:4px;border-radius:2px;background:#30363d;margin:0 auto 14px}
.sheet h3{font-size:15px;font-weight:600;margin-bottom:14px;text-align:center}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:#8b949e;display:block;margin-bottom:3px}
.form-group input{width:100%;padding:10px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:16px;font-weight:600}
.form-hint{font-size:10px;color:#484f58;margin-top:2px}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>QQQ 定投策略</h1>
      <div class="sub" id="updateTime">加载中...</div>
    </div>
    <button class="settings-btn" onclick="showSettings()">⚙</button>
  </div>

  <!-- 加载 -->
  <div class="state-box" id="loading">
    <div class="spinner"></div>
    <p>获取数据中...</p>
  </div>

  <!-- 错误 -->
  <div class="state-box" id="error" style="display:none">
    <div class="icon">⚠️</div>
    <p id="errorMsg" style="margin-bottom:12px">数据获取失败</p>
    <button class="btn-primary" style="width:200px" onclick="loadData()">重新获取</button>
  </div>

  <!-- 内容 -->
  <div id="content" style="display:none;flex:1;display:flex;flex-direction:column">
    <div class="scroll">
      <!-- 信号卡 -->
      <div class="signal-card" id="signalCard">
        <div class="signal-icon" id="signalIcon">📊</div>
        <div class="signal-label" id="signalLabel">--</div>
        <div class="signal-detail" id="signalDetail">--</div>
      </div>

      <!-- 三数据 -->
      <div class="data-strip">
        <div class="data-block">
          <div class="lbl">现价</div>
          <div class="val" id="price">--</div>
          <div class="sub">USD</div>
        </div>
        <div class="data-block">
          <div class="lbl">高点回撤</div>
          <div class="val" id="drawdown">--</div>
          <div class="sub" id="ddDesc">--</div>
        </div>
        <div class="data-block">
          <div class="lbl">VIX<span id="vixStaleDot"></span></div>
          <div class="val" id="vix">--</div>
          <div class="sub" id="vixDesc">--</div>
        </div>
      </div>

      <!-- 档位指示器 -->
      <div class="tier-bar" id="tierBar">
        <div class="tier" id="tier4"><span class="tnum">🚀</span>崩盘</div>
        <div class="tier" id="tier3"><span class="tnum">🔥</span>熊市</div>
        <div class="tier" id="tier2"><span class="tnum">⚡</span>中度</div>
        <div class="tier" id="tier1"><span class="tnum">🌊</span>回调</div>
        <div class="tier" id="tier0"><span class="tnum">☀️</span>平静</div>
      </div>

      <!-- 结果 -->
      <div class="result-box" id="resultBox">
        <div class="result-row">
          <div class="label">每周基础定投</div>
          <div class="value" style="color:#8b949e">¥<span id="baseDisplay">675</span></div>
        </div>
        <div class="result-row" id="extraRow">
          <div class="label" id="extraLabel">操作</div>
          <div class="value big" id="extraAmount">--</div>
        </div>
        <div class="result-row">
          <div class="label">本周总投入</div>
          <div class="value big" id="totalAmount" style="color:#58a6ff">--</div>
        </div>
      </div>

      <!-- 判断详情 -->
      <div class="detail-box" id="detailBox">
        <div class="title">触发判断</div>
        <div id="detailLines"></div>
      </div>

      <!-- 止盈/减仓 -->
      <div class="tp-box" id="tpBox">
        <div class="tp-title">止盈 / 减仓信号</div>
        <div id="tpLines"></div>
      </div>

      <div class="footer">
        VIX+回撤四档加仓 · 平静区不加码<br>
        每周末投前刷新一次 · 仅供参考
      </div>
    </div>
    <button class="btn-primary" id="refreshBtn" onclick="loadData()">🔄 刷新数据</button>
  </div>
</div>

<!-- 设置 -->
<div class="overlay" id="overlay" onclick="hideSettings()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <h3>⚙ 定投设置</h3>
  <div class="form-group">
    <label>每周基础定投金额</label>
    <input type="number" id="baseInput" placeholder="675" min="100" step="50">
    <div class="form-hint">用于计算各档位加仓额度</div>
  </div>
  <div class="form-group">
    <label>账户累计盈利 %</label>
    <input type="number" id="profitInput" placeholder="0" step="5">
    <div class="form-hint">你的QQQ持仓总盈利百分比，用于触发止盈信号</div>
  </div>
  <button class="btn-primary" onclick="saveSettings()">保存</button>
</div>

<script>
// ========== 存储 ==========
const SK='qqq_base';const SP='qqq_profit';
function loadBase(){return parseInt(localStorage.getItem(SK))||675}
function saveBase(v){localStorage.setItem(SK,v.toString())}
function loadProfit(){return parseInt(localStorage.getItem(SP))||0}
function saveProfit(v){localStorage.setItem(SP,v.toString())}

// ========== 四档加仓标准 ==========
function getTier(vix, dd) {
  // VIX 平静区限制：VIX<20时禁止任何加仓
  if (vix != null && vix < 20) return {tier:0, label:'平静区', mult:0, msg:'VIX<20：市场过热/泡沫区，禁止额外加仓，仅保留基础定投'};
  
  // 四档：从高到低匹配，必须同时满足 VIX + 回撤
  if (vix != null && vix >= 40 && dd >= 30) return {tier:4, label:'史诗级崩盘', mult:3, msg:'十年一遇，全力加仓', icon:'🚀'};
  if (vix != null && vix >= 35 && dd >= 20) return {tier:3, label:'深度熊市回调', mult:2, msg:'危机区核心窗口，长期黄金买点', icon:'🔥'};
  if (vix != null && vix >= 25 && dd >= 15) return {tier:2, label:'中度回调', mult:1, msg:'恐慌区优先，科技板块杀跌', icon:'⚡'};
  if (vix != null && vix >= 20 && dd >= 10) return {tier:1, label:'小幅回调', mult:0.5, msg:'震荡区/恐慌区生效，小幅调整', icon:'🌊'};
  
  // 未触发任何档位
  return {tier:0, label:'平静区', mult:0, msg:'未触发任何加仓档位，仅保留基础定投'};
}

// ========== 字节级解析 ==========
function bytesToStr(buf){const b=new Uint8Array(buf);let s='';for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return s}
function parseQQQ(t){const m=t.match(/v_usQQQ="(.*?)"/);if(!m)return null;const f=m[1].split('~');if(f.length<68)return null;const p=parseFloat(f[3]),h=parseFloat(f[48]);return(!isNaN(p)&&!isNaN(h))?{price:p,high52:h,time:f[30]}:null}
function parseVIX(t){const m=t.match(/v_usVIX="(.*?)"/);if(!m)return null;const f=m[1].split('~');if(f.length<4)return null;const v=parseFloat(f[3]);if(isNaN(v)||v<=0)return null;const ts=f[30]||'';let stale=false;if(ts){try{stale=(Date.now()-new Date(ts.replace(/-/g,'/')).getTime())>86400000}catch(e){stale=true}}return{vix:v,stale}}

// ========== 渲染 ==========
function render(d) {
  const base = loadBase();
  document.getElementById('loading').style.display='none';
  document.getElementById('error').style.display='none';
  document.getElementById('content').style.display='flex';
  document.getElementById('baseDisplay').textContent=base.toLocaleString();

  const now=new Date();
  document.getElementById('updateTime').textContent='更新 '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');

  // 数据
  document.getElementById('price').textContent=d.price.toFixed(2);
  document.getElementById('drawdown').textContent=d.drawdown+'%';
  document.getElementById('ddDesc').textContent=d.dd_desc;
  document.getElementById('vix').textContent=d.vix!=null?d.vix.toFixed(1):'N/A';
  document.getElementById('vixDesc').textContent=d.vix_desc;
  document.getElementById('vixStaleDot').className=d.vix_stale?'stale-dot':'';

  // 信号
  const tierColors=['#484f58','#d29922','#f57c00','#f85149','#c62828'];
  const tierNames=['未知','🌊 小幅回调','⚡ 中度回调','🔥 深度熊市','🚀 史诗级崩盘'];
  const signalName = d.tier>0 ? tierNames[d.tier] : d.vix!=null&&d.vix<20?'☀️ 平静区':'📊 常规操作';
  const signalDetail = d.tier>0 ? d.tierMsg : (d.vix!=null&&d.vix<20?'VIX<20：仅基础定投':'未触发加仓条件');

  document.getElementById('signalIcon').textContent=signalName.match(/^./)?.[0]||'📊';
  document.getElementById('signalLabel').textContent=signalName.replace(/^.\s*/,'');
  const c=tierColors[d.tier]||'#484f58';
  document.getElementById('signalLabel').style.color=c;
  document.getElementById('signalCard').style.borderColor=c;
  document.getElementById('signalDetail').textContent=signalDetail;

  // 档位条
  for(let i=0;i<=4;i++){
    const el=document.getElementById('tier'+i);
    if(!el)continue;
    el.className='tier'+(i==d.tier?' active':'')+(i<d.tier?' used':'');
    if(i==d.tier){
      el.style.setProperty('--tc',tierColors[i]);
      el.style.setProperty('--tb',tierColors[i]+'15');
    }
  }
  // 档位标签
  const tierLabels=['平静','回调','中度','熊市','崩盘'];
  const tierIcons=['☀️','🌊','⚡','🔥','🚀'];
  for(let i of[4,3,2,1,0]){
    const el=document.getElementById('tier'+i);
    if(el)el.innerHTML='<span class="tnum">'+tierIcons[i]+'</span>'+tierLabels[i];
  }

  // 金额
  const extra=Math.round(base*d.mult);
  const total=base+extra;
  const extraEl=document.getElementById('extraAmount');
  const extraLabelEl=document.getElementById('extraLabel');
  const extraRow=document.getElementById('extraRow');
  if(extra>0){
    extraEl.textContent='+¥'+extra.toLocaleString();
    extraEl.className='value big val-pos';
    extraLabelEl.textContent='额外加仓';
  }else{
    extraEl.textContent='无额外加仓';
    extraEl.className='value big val-neutral';
    extraLabelEl.textContent='操作';
  }
  document.getElementById('totalAmount').textContent='¥'+total.toLocaleString();

  // 判断详情
  const dl=document.getElementById('detailLines');
  let html='';
  html+='<div class="detail-line">VIX='+(d.vix!=null?d.vix.toFixed(1):'N/A')+'，回撤='+d.drawdown+'%</div>';
  if(d.tier>0){
    html+='<div class="detail-line"><span class="tag green">触发档位'+d.tier+'</span>'+d.tierMsg+'</div>';
    html+='<div class="detail-line">条件：VIX'+(d.vix!=null?'≥'+d.tierVixThresh:'N/A')+' + 回撤≥'+d.tierDdThresh+'%</div>';
    html+='<div class="detail-line">加仓：基础¥'+base.toLocaleString()+' × '+d.mult+' = +¥'+extra.toLocaleString()+'</div>';
  }else if(d.vix!=null&&d.vix<20){
    html+='<div class="detail-line"><span class="tag yellow">平静区</span>VIX='+d.vix.toFixed(1)+'<20，禁止加仓</div>';
  }else{
    let reason='';
    if(d.vix!=null&&d.vix<20)reason='VIX='+d.vix.toFixed(1)+'<20平静区';
    else if(d.vix==null)reason='VIX数据不可用';
    else if(d.drawdown<10)reason='回撤'+d.drawdown+'%不足10%';
    else reason='条件未完全满足';
    html+='<div class="detail-line"><span class="tag gray">未触发</span>'+reason+'</div>';
  }
  dl.innerHTML=html;

  // ===== 止盈/减仓逻辑（始终显示） =====
  const profit=loadProfit();
  const tpEl=document.getElementById('tpBox');
  const tpLines=document.getElementById('tpLines');
  let tpHtml='';

  // 规则1：高位减仓（VIX低位泡沫区）
  if(d.vix!=null&&d.vix<18&&profit>=35){
    tpHtml+='<div class="tp-line"><span class="tag sell">🛑 卖出</span>高位减仓信号已触发</div>';
    tpHtml+='<div class="tp-line">VIX='+d.vix.toFixed(1)+'<18 + 盈利'+profit+'%≥35%</div>';
    tpHtml+='<div class="tp-line">操作：卖出总仓位25%，资金划入备用池，等下跌买回</div>';
  }else if(d.vix!=null&&d.vix<18){
    tpHtml+='<div class="tp-line"><span class="tag warn">👀 监控</span>VIX='+d.vix.toFixed(1)+'<18，泡沫区预警</div>';
    tpHtml+='<div class="tp-line">盈利'+profit+'%，达35%触发减仓（还差'+(35-profit)+'%）</div>';
  }else{
    tpHtml+='<div class="tp-line"><span class="tag hold">✅ 正常</span>VIX='+(d.vix!=null?d.vix.toFixed(1):'N/A')+'≥18，未进入泡沫区</div>';
    tpHtml+='<div class="tp-line">盈利'+profit+'%，暂不需止盈操作</div>';
  }

  // 规则2：大幅回撤保护性减仓
  if(d.vix!=null&&d.vix>35&&d.drawdown>=40){
    tpHtml+='<div class="tp-line"><span class="tag sell">🛡️ 减仓</span>极端趋势走熊保护</div>';
    tpHtml+='<div class="tp-line">VIX>35 + 回撤'+d.drawdown+'%≥40%</div>';
    tpHtml+='<div class="tp-line">操作：减仓10%保留底仓，剩余留到更深位置加仓</div>';
    tpHtml+='<div class="tp-line" style="color:#484f58;font-size:10px">⚠️ 需确认连续下跌≥8周再执行</div>';
  }else if(d.vix!=null&&d.vix>35){
    tpHtml+='<div class="tp-line"><span class="tag warn">👀 监控</span>VIX>35但回撤'+d.drawdown+'%不足40%</div>';
  }else if(d.drawdown>=20){
    tpHtml+='<div class="tp-line"><span class="tag warn">👀 监控</span>回撤已较深('+d.drawdown+'%)，但VIX='+(d.vix!=null?d.vix.toFixed(1):'N/A')+'未>35</div>';
  }else{
    tpHtml+='<div class="tp-line"><span class="tag hold">✅ 正常</span>未触发保护性减仓条件</div>';
  }

    tpEl.style.display='block';
    tpLines.innerHTML=tpHtml;

  startTimer(60);
}

let ti=null;
function startTimer(s){if(ti)clearInterval(ti);let r=s;ti=setInterval(()=>{r--;if(r<=0){clearInterval(ti);loadData()}},1000)}

// ========== 数据获取 ==========
async function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('error').style.display='none';
  document.getElementById('content').style.display='none';
  document.getElementById('refreshBtn').disabled=true;
  document.getElementById('refreshBtn').textContent='⏳ 获取中...';
  const ctrl=new AbortController();
  const to=setTimeout(()=>ctrl.abort(),15000);
  try{
    const[qr,vr]=await Promise.all([
      fetch('https://qt.gtimg.cn/q=usQQQ',{signal:ctrl.signal}),
      fetch('https://qt.gtimg.cn/q=usVIX',{signal:ctrl.signal})
    ]);
    clearTimeout(to);
    const qt=bytesToStr(await qr.arrayBuffer()),vt=bytesToStr(await vr.arrayBuffer());
    const qqq=parseQQQ(qt),vixD=parseVIX(vt);
    if(!qqq){showError('QQQ数据解析失败');return}
    const dd=((qqq.high52-qqq.price)/qqq.high52)*100;
    const v=vixD?vixD.vix:null;
    const {tier,mult,msg}=getTier(v,dd);

    let vixDesc='N/A';
    if(v!=null){
      if(v<15)vixDesc='自满';
      else if(v<20)vixDesc='正常';
      else if(v<25)vixDesc='关注';
      else if(v<30)vixDesc='恐慌';
      else if(v<40)vixDesc='极度恐慌';
      else vixDesc='极端恐慌';
    }
    let ddDesc='正常波动';
    if(dd>=30)ddDesc='崩盘';
    else if(dd>=20)ddDesc='深度调整';
    else if(dd>=15)ddDesc='中度调整';
    else if(dd>=10)ddDesc='小幅回调';
    else if(dd>=5)ddDesc='轻微回调';

    const tierVixThresh=[0,20,25,35,40][tier]||0;
    const tierDdThresh=[0,10,15,20,30][tier]||0;

    render({
      price:qqq.price,drawdown:Math.round(dd*10)/10,
      vix:v,vix_desc:vixDesc,vix_stale:vixD?vixD.stale:false,
      dd_desc:ddDesc,tier,mult,tierMsg:msg,
      tierVixThresh,tierDdThresh,
    });
  }catch(e){
    showError('请求失败: '+(e.message||e.name||''));
  }finally{
    document.getElementById('refreshBtn').disabled=false;
    document.getElementById('refreshBtn').textContent='🔄 刷新数据';
  }
}
function showError(m){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='flex';document.getElementById('errorMsg').textContent=m}

// ========== 设置 ==========
function showSettings(){document.getElementById('baseInput').value=loadBase();document.getElementById('profitInput').value=loadProfit();document.getElementById('overlay').classList.add('show');document.getElementById('sheet').classList.add('show')}
function hideSettings(){document.getElementById('overlay').classList.remove('show');document.getElementById('sheet').classList.remove('show')}
function saveSettings(){const v=parseInt(document.getElementById('baseInput').value)||675;const p=parseInt(document.getElementById('profitInput').value)||0;saveBase(v);saveProfit(p);hideSettings();loadData()}

loadData();
</script>
