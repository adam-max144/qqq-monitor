name: Fetch VXN Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch VXN from Yahoo Finance
        run: |
          pip install yfinance -q
          python3 << 'EOF'
import yfinance as yf, json, os
from datetime import datetime, timezone

# Try VXN first
try:
    tk = yf.Ticker("^VXN")
    hist = tk.history(period="2d")
    if len(hist) > 0:
        price = round(float(hist["Close"].iloc[-1]), 2)
        date = hist.index[-1].strftime("%Y-%m-%d")
        src = "yahoo_^VXN"
        print(f"VXN={price} ({date})")
    else:
        raise Exception("No data")
except Exception as e:
    print(f"VXN failed: {e}")
    # Fallback: VIX
    try:
        tk = yf.Ticker("^VIX")
        hist = tk.history(period="2d")
        price = round(float(hist["Close"].iloc[-1]) + 4.0, 1)
        date = hist.index[-1].strftime("%Y-%m-%d")
        src = "yahoo_^VIX+estimate"
        print(f"VIX fallback -> VXN={price} ({date})")
    except Exception as e2:
        print(f"Both failed: {e2}")
        exit(0)

data = {"vxn": price, "date": date,
        "fetched_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
        "source": src}
with open("vxn.json", "w") as f:
    json.dump(data, f, indent=2)
print(f"Written: VXN={price}")
EOF

      - name: Commit and push
        run: |
          git config user.name "VXN Bot"
          git config user.email "vxn-bot@qqq-monitor"
          git add vxn.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update VXN data"
            git push
            echo "Pushed"
          fi
