name: Fetch VXN Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save VXN
        run: |
          python3 -c "
import json, urllib.request
from datetime import datetime, timezone

def get_csv(url):
    req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
    with urllib.request.urlopen(req, timeout=90) as r:
        lines = r.read().decode().strip().split('\n')
    last = lines[-1].split(',')
    return last[0].strip(), float(last[1])

try:
    d, v = get_csv('https://fred.stlouisfed.org/graph/fredgraph.csv?id=VXNCLS&cosd=2026-01-01')
    v = round(v, 2); s = 'fred_vxncls'
    print(f'VXN={v} ({d})')
except Exception as e:
    print(f'VXN fail: {e}')
    try:
        d, vi = get_csv('https://fred.stlouisfed.org/graph/fredgraph.csv?id=VIXCLS&cosd=2026-01-01')
        v = round(vi + 4.0, 1); s = 'fred_vix_estimate'
        print(f'VIX={vi} -> VXN={v} ({d})')
    except Exception as e2:
        print(f'All failed: {e2}'); raise SystemExit(1)

o = {'vxn': v, 'date': d, 'fetched_at': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'), 'source': s}
with open('vxn.json', 'w') as f:
    json.dump(o, f, indent=2)
print('Done')
"

      - name: Commit and push
        run: |
          git config user.name "VXN Bot"
          git config user.email "vxn-bot@qqq-monitor"
          git add vxn.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update VXN data"
            git push
            echo "Pushed"
          fi
