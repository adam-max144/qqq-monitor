name: Fetch VXN Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [fetch-vxn]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch VXN from Yahoo Finance
        run: |
          # ^VXN = %5EVXN in URL encoding
          JSON=$(curl -s --max-time 30 \
            "https://query1.finance.yahoo.com/v8/finance/chart/%5EVXN?interval=1d&range=5d" \
            -H "User-Agent: Mozilla/5.0" -H "Accept: application/json")
          
          if [ -n "$JSON" ]; then
            # Extract price from JSON
            PRICE=$(echo "$JSON" | python3 -c "
import json,sys
d=json.load(sys.stdin)
meta=d['chart']['result'][0]['meta']
price=meta.get('regularMarketPrice')
if price is None:
    quotes=d['chart']['result'][0]['indicators']['quote'][0]
    closes=quotes.get('close',[])
    for v in reversed(closes):
        if v is not None:
            price=v
            break
if price is None:
    price=meta.get('chartPreviousClose')
ts=meta.get('regularMarketTime')
from datetime import datetime
date=datetime.utcfromtimestamp(ts).strftime('%Y-%m-%d') if ts else 'unknown'
print(f'{round(price,2)},{date}')
")
            VXN=$(echo "$PRICE" | cut -d, -f1)
            DATE=$(echo "$PRICE" | cut -d, -f2)
            SRC="yahoo_^VXN"
            echo "VXN=$VXN ($DATE)"
          fi

          # Fallback: VIX
          if [ -z "$VXN" ] || [ "$VXN" = "0" ]; then
            echo "VXN failed, trying VIX..."
            JSON=$(curl -s --max-time 30 \
              "https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=5d" \
              -H "User-Agent: Mozilla/5.0" -H "Accept: application/json")
            if [ -n "$JSON" ]; then
              VIX=$(echo "$JSON" | python3 -c "
import json,sys
d=json.load(sys.stdin)
meta=d['chart']['result'][0]['meta']
price=meta.get('regularMarketPrice')
if price is None:
    quotes=d['chart']['result'][0]['indicators']['quote'][0]
    closes=quotes.get('close',[])
    for v in reversed(closes):
        if v is not None:
            price=v
            break
if price is None:
    price=meta.get('chartPreviousClose')
ts=meta.get('regularMarketTime')
from datetime import datetime
date=datetime.utcfromtimestamp(ts).strftime('%Y-%m-%d') if ts else 'unknown'
print(f'{round(price,2)},{date}')
")
              VIX_VAL=$(echo "$VIX" | cut -d, -f1)
              DATE=$(echo "$VIX" | cut -d, -f2)
              VXN=$(python3 -c "print(round(float($VIX_VAL)+4.0,1))")
              SRC="yahoo_^VIX+estimate"
              echo "VIX=$VIX_VAL -> VXN=$VXN ($DATE)"
            fi
          fi

          if [ -z "$VXN" ] || [ "$VXN" = "0" ]; then
            echo "All sources failed, skipping"
            exit 0
          fi

          python3 -c "
import json
from datetime import datetime,timezone
o={'vxn':$VXN,'date':'$DATE','fetched_at':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'source':'$SRC'}
with open('vxn.json','w') as f: json.dump(o,f,indent=2)
print('Written: VXN=$VXN')
"

      - name: Commit and push if changed
        run: |
          git config user.name "VXN Bot"
          git config user.email "vxn-bot@qqq-monitor"
          git add vxn.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update VXN data"
            git push
            echo "Pushed"
          fi
