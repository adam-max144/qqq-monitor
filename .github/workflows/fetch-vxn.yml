name: Fetch VXN Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Fetch VXN
        run: |
          echo "=== Attempt 1: FRED VXN ==="
          CSV=$(curl -s --max-time 180 -4 "https://fred.stlouisfed.org/graph/fredgraph.csv?id=VXNCLS&cosd=2026-01-01")
          if [ -n "$CSV" ]; then
            LAST=$(echo "$CSV" | tail -1)
            DATE=$(echo "$LAST" | cut -d, -f1)
            VAL=$(echo "$LAST" | cut -d, -f2)
            VXN=$(python3 -c "print(round(float($VAL),2))")
            SRC="fred_vxncls"
            echo "VXN=$VXN ($DATE)"
          else
            echo "=== Attempt 2: FRED VIX ==="
            CSV=$(curl -s --max-time 180 -4 "https://fred.stlouisfed.org/graph/fredgraph.csv?id=VIXCLS&cosd=2026-01-01")
            if [ -n "$CSV" ]; then
              LAST=$(echo "$CSV" | tail -1)
              DATE=$(echo "$LAST" | cut -d, -f1)
              VIX=$(echo "$LAST" | cut -d, -f2)
              VXN=$(python3 -c "print(round(float($VIX)+4.0,1))")
              SRC="fred_vix_estimate"
              echo "VIX=$VIX -> VXN=$VXN ($DATE)"
            else
              echo "=== Attempt 3: backup source ==="
              echo "FRED unavailable, will skip this run"
              exit 0
            fi
          fi

          echo "=== Writing vxn.json ==="
          python3 -c "
import json
from datetime import datetime, timezone
o = {'vxn': $VXN, 'date': '$DATE', 'fetched_at': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'), 'source': '$SRC'}
with open('vxn.json', 'w') as f: json.dump(o, f, indent=2)
print('VXN=$VXN')
"

      - name: Commit and push
        if: success()
        run: |
          git config user.name "VXN Bot"
          git config user.email "vxn-bot@qqq-monitor"
          git add vxn.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update VXN data"
            git push
            echo "Pushed"
          fi
