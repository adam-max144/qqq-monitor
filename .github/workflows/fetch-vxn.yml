name: Fetch VXN Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [fetch-vxn]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch VXN
        run: python3 scripts/fetch_vxn.py
      - name: Commit and push
        run: |
          git config user.name "VXN Bot"
          git config user.email "vxn-bot@qqq-monitor"
          git add vxn.json
          if git diff --staged --quiet; then echo "No changes"; else
            git commit -m "auto: update VXN data"
            git push && echo "Pushed"
          fi
