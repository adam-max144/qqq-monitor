name: Fetch VXN Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch VXN from FRED via curl
        run: |
          # Try VXN first
          CSV=$(curl -s --max-time 90 "https://fred.stlouisfed.org/graph/fredgraph.csv?id=VXNCLS&cosd=2026-01-01")
          if [ $? -eq 0 ] && [ -n "$CSV" ]; then
            LAST=$(echo "$CSV" | tail -1)
            DATE=$(echo "$LAST" | cut -d, -f1)
            VAL=$(echo "$LAST" | cut -d, -f2)
            VXN=$(python3 -c "print(round(float($VAL),2))")
            SRC="fred_vxncls"
            echo "VXN=$VXN ($DATE)"
          else
            echo "VXN failed, trying VIX..."
            CSV=$(curl -s --max-time 90 "https://fred.stlouisfed.org/graph/fredgraph.csv?id=VIXCLS&cosd=2026-01-01")
            LAST=$(echo "$CSV" | tail -1)
            DATE=$(echo "$LAST" | cut -d, -f1)
            VIX=$(echo "$LAST" | cut -d, -f2)
            VXN=$(python3 -c "print(round(float($VIX)+4.0,1))")
            SRC="fred_vix_estimate"
            echo "VIX=$VIX -> VXN=$VXN ($DATE)"
          fi

          NOW=$(python3 -c "from datetime import datetime,timezone;print(datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'))")
          python3 -c "
import json
o = {'vxn': $VXN, 'date': '$DATE', 'fetched_at': '$NOW', 'source': '$SRC'}
with open('vxn.json', 'w') as f:
    json.dump(o, f, indent=2)
print('Written: VXN=$VXN')
"

      - name: Commit and push if changed
        run: |
          git config user.name "VXN Bot"
          git config user.email "vxn-bot@qqq-monitor"
          git add vxn.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update VXN data"
            git push
            echo "Pushed"
          fi
